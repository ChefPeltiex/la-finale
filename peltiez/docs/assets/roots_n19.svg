  <line class="axis" x1="60.0" y1="180.0" x2="300.0" y2="180.0"/>
  <line class="axis" x1="180.0" y1="60.0" x2="180.0" y2="300.0"/>
  <circle class="center-dot" cx="180.0" cy="180.0" r="2"/>
  <!-- racines non primitives (dessinées en premier) -->

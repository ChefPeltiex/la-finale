      .center-dot { fill: #2c3e50; stroke: none; }
      .pt-nonprim { fill: #7f8c8d; stroke: #566573; stroke-width: 1; }
      .pt-prim { fill: #e67e22; stroke: #a04000; stroke-width: 1; }
    ]]></style>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360" role="img" aria-label="Racines 23-ièmes de l'unité">
  <title>Racines 23-ièmes de l'unité : primitives (orange) vs autres (gris)</title>
  <desc>23 points sur un cercle de rayon 120 centré en (180,180). Position k : (180+120cos(2πk/23), 180−120sin(2πk/23)). Primitives : indices k avec pgcd(k,23)=1.</desc>

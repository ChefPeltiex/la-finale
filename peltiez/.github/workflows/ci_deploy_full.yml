# Full CI: build → package Lambda to S3 → Terraform apply (CirculAI φ).
#
# Secrets (repository / environment):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY — IAM user or role keys for CI
#   AWS_REGION — e.g. eu-west-3
#   LAMBDA_S3_BUCKET — artifacts bucket for Lambda zip (must exist; Terraform reads same bucket/key)
#   TF_PROJECT — short prefix for `project` in tfvars
#   TF_CERTIFICATE_ARN — optional ACM cert ARN in us-east-1 for custom CloudFront TLS (empty = default CF cert)
#   TF_EVENT_COLLECTOR_URL — optional POST sink for Lambda (empty allowed)
#   TF_ASSIGN_PROB_CONTROL — string fraction e.g. "0.95" for control assignment probability
#   TF_DOMAIN — optional custom hostname for CloudFront (must match ACM cert when set)
# Optional later: OIDC role assumption instead of long-lived keys (id-token: write is reserved for that).

name: CI deploy full

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      lambda_key: ${{ steps.set-key.outputs.lambda_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint && npm run typecheck

      - name: Build app
        run: npm run build

      - name: Stage CirculAI φ assets into dist
        run: |
          mkdir -p dist
          cp public/circulai-phi/index.html dist/
          if [ -f public/circulai-phi/design-tokens.css ]; then cp public/circulai-phi/design-tokens.css dist/; fi
          if [ -f public/circulai-phi/ab_experiment.js ]; then cp public/circulai-phi/ab_experiment.js dist/; fi

      - name: Set Lambda artifact key
        id: set-key
        run: echo "lambda_key=${GITHUB_SHA}/lambda-ab.zip" >> "$GITHUB_OUTPUT"

  package-and-upload:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      LAMBDA_S3_BUCKET: ${{ secrets.LAMBDA_S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package and upload Lambda
        run: |
          chmod +x scripts/package_lambda.sh
          bash scripts/package_lambda.sh "$LAMBDA_S3_BUCKET" "${{ needs.build.outputs.lambda_key }}"

  terraform-deploy:
    runs-on: ubuntu-latest
    needs: [package-and-upload, build]
    env:
      AWS_REGION_VAL: ${{ secrets.AWS_REGION }}
      TF_PROJECT_VAL: ${{ secrets.TF_PROJECT }}
      TF_CERT_ARN: ${{ secrets.TF_CERTIFICATE_ARN }}
      LAMBDA_BUCKET: ${{ secrets.LAMBDA_S3_BUCKET }}
      LAMBDA_KEY: ${{ needs.build.outputs.lambda_key }}
      TF_EVENT_URL: ${{ secrets.TF_EVENT_COLLECTOR_URL }}
      TF_ASSIGN_PROB: ${{ secrets.TF_ASSIGN_PROB_CONTROL }}
      TF_DOMAIN: ${{ secrets.TF_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare tfvars
        run: |
          {
          echo "aws_region = \"${AWS_REGION_VAL}\""
          echo "project = \"${TF_PROJECT_VAL}\""
          echo "certificate_arn = \"${TF_CERT_ARN}\""
          echo "domain = \"${TF_DOMAIN}\""
          echo "lambda_s3_bucket = \"${LAMBDA_BUCKET}\""
          echo "lambda_s3_key = \"${LAMBDA_KEY}\""
          echo "event_collector_url = \"${TF_EVENT_URL}\""
          echo "assign_prob_control = \"${TF_ASSIGN_PROB:-0.5}\""
          } > terraform/terraform.ci.tfvars

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var-file=terraform.ci.tfvars

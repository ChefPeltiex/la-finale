name: igor-verify

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  verify:
    name: verify (lint · types · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: peltiez
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: peltiez/package-lock.json
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Lint, types & build
        run: npm run verify

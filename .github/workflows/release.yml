# Crée une GitHub Release quand un tag semver `v*` est poussé (ex. v0.0.0).
# Prérequis : mettre à jour CHANGELOG.md avant le tag ; ce workflow ajoute des release notes auto en complément.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
